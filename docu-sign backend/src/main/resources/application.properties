spring.application.name=docu-sign


server.port=${PORT:9099}


spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

supabase.url=${SUPABASE_URL}
supabase.api.key=${SUPABASE_SECRET_KEY}
supabase.bucket=documents

spring.datasource.hikari.maximum-pool-size=3

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# SMTP

#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=${APP_EMAIL}
#spring.mail.password=${APP_PASSWORD}
#
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL

app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}


resend.api.key=${RESEND_API_KEY}

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG